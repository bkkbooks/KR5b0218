body:
  text: 壇燈幡文一墠壇方三丈六尺纂開十方榜用傳授如外壇者纂內去纂一尺方然八燈黑書白簡三十二天號朱書諱下黑書官治依經次第中央懸青幡幡長一丈六尺書三皇天文各十五字令滿竿長二丈四尺拭校使堅行道時數亦隨所堪此為告請六為勝其有二異餘悉效前禮謝三十二天二捻香祝願畢向北唱臣等歸命太黃皇曽天帝君再拜以次八天竟伏叩頭至懴竟大災散髮法師長小聲讀文不須散髮臣某等上啓太黃皇曽天帝君呼諱紫極宫諸靈官以次盡八天心謹請北方東壁營室危虛須女牽牛南斗東北七宿八天帝君賜降慈恩開許大赦原除肉人姓名宿世積罪下及某身三曽五祖七世父母歷世愆惡一切乞丐從三赦之恩願得上謝北方八帝君解某生死所犯天羅地網基謫除散增延年算與之更始自今巳後福業興隆公私勝泰宦學髙通功成德就合門歡欣所願諧果仰受大恩畢齊起向東次南次西禮謝皆效前如此恆能行此免洪永之災永為種人保常存之樂禁斷一中元祈請日數積多逆屏他事供辦所須别立齋所禁斷四周雜人雞犬不得聽入入則犯禁便應解别受剋日障隔唯堅預齋供辦奉灑掃飲食簡擇良人非事俗者道民法身精謹忠信潔淨堪使計周事而巳不須多人多人多罪或病或耆或有公私非意連建此壞齋極為不易嚴加詳愼同志玄靈所齋之人悉不出門外人來者市買所須住門外並不得進內人接取别屋淨之若病慘公私必是危急出去勿還還得至門參承莫入尤禁雞犬嚴防竊盜男女至親雖是法身皆不得共此齋所墠燈二墠平廣淨方十二丈欄纂繩榜三重開門依如傳授三壇墠廣為異耳欲近山永間曠之地方十八燈在外壇欄纂內去纂三尺許齊平堅安同髙五尺城容斗餘一香一油間中六尺大猛火光煙不得中絶若遇風雨移還大堂堂方二丈方十八燈相去尺許減此則許闕追補無燈之夕不得行道指朝講讀修習而巳法燈之外要處安之多少大小隨人所辦幡文三墠中央安材格堅長竿竿用大竹一尺餘圍長四丈五尺懸青旙長三十六尺備書三皇文令滿上安鐵橫及鈎帶竪係轆轤繩纜上下流利辟雨及風精緊卷舒纜斷竿折皆為不祥悉即懴悔首罪乞原依法更作務使堅嚴有善瑞來儀雲氣交集上清經文字有覺如此者啓告謝恩建齋之夕施安堂墠連燈載幡皆令整肅訖素采依法書三皇文舒置三案上牀楨磔兩邊法巾藉之露上勿覆行道竟覆之齋竟送天文維上埋地文墠中水文投流水簡各隨之齋官同異四法師都講監齋侍經侍香侍燈六人入墠同如前儀有散齋為異耳香燈既多别立散官墠外禮拜亦不入堂專營治香錬油續火不過九人寧少而精皆勤幹堪事敬信可委者此以外一切勿至墠堂之所都講監齋咨審法師動靜是非諦明勿誤誤辭首悔禮懴乞願不爾被考明各愼之宿集同異五宿集飲食朝禮上啓説戒讀簡詮官拜受復爐咏出同如常儀唯侍經侍香侍燈使迎直墠為異正齋同異六正齋日平旦入墠漱祝巡咏存思禮祝發爐出官上香祝願皆同常儀唯出官上香辭中言上啓加云三十六天帝三十六土皇為異向東九天禮懴臣等至心歸命第一無景無色無量天帝君再拜仍伏叩頭五心懴竟齊起大哭重病散髮叩頭不須搏頰臣某等上啓太上無無至真無上無為大道應感真精第一無景無色無量天帝君諱缺謹有當今皇帝遇荷玄恩幸藉餘慶屬當萬機君臨億兆任重嵩恆道慕堯舜既纘承於大業每省惕於眇躬道俗凌夷淳化難振隂翊匪資於鴻覆生靈曷遂於燕安或旱潦之所災或民庶之多難覩此物癘用叩天恩冀社稷之尊隆庶民物之康阜今以至心回向大道歸依天帝委命至真攜請臣等建三皇中元祈請大齋臣等誠愚誠魯非贊大猷之人特念巳叨巳忝敢負登盟之誓謹共精嚴依洞神之法立墠設位象三十六天燒香然燈應三十六地消釋幽暗招引神明為某標露真文揚幡請命披心散髮謝過自新伏願天帝君降大慈之恩流罔極之澤垂救度之福賜更造之仁使道達神氣和合靈官衛護某身原赦宿新無量罪咎矜奬即今改悔丹誠以是功德歸流某七廟之靈九玄七祖一切先亡同得離幽苦上升福堂轉輪成真利祐見在使陵廟墳基肅寧殃注斷絶宫宅安穩怪夢消除二儀交泰則七曜調明風雨以時暄涼應節黎庶咸安兵戈止息天下太平醜虜歸降某所苦某病即蒙差愈或官司盜賊即得免過隨事言之衆災度脫壽命延長皇家道德日盛四海災消禎祥雲集八節安和一切羣生咸蒙福慶俱服正教同歸自然得道之後與天帝合真畢齊起依次至第二天唯朱字諱異餘悉同臣某等上啓太上無無至真無上無為大道應感真精第二無形清微天帝君諱馮提阿沙越家摩須雲持謹有當今皇帝遇荷玄恩幸藉餘慶屬當萬機君臨億兆任重嵩恆道慕堯舜既纘承於大業每省惕於眇躬道俗凌夷淳化難振隂翊匪資於鴻覆生靈曷遂於燕安或旱潦之所災或民庶之多難覩此物癘用叩天恩冀社稷之尊隆庶民物之康阜今以至心回向大道歸依天帝委命至真攜請臣等建三皇中元祈請大齋臣等誠愚誠魯非贊大猷之人特念巳叨巳忝敢負登盟之誓謹共精嚴依洞神之法立墠設位象三十六天燒香然燈應三十六地消釋幽暗招引神明為某摽露真文揚幡請命披心散髮謝過自新伏願天帝君降大慈之恩流罔極之澤垂救度之福賜更造之仁使道達神氣和合靈官衛護某身原赦宿新無量罪咎矜奬即今改悔丹誠以是功德歸流某七廟之靈九玄七祖一切先亡同得離幽苦上升福堂轉輪成真利祐見在使陵廟墳基肅寧殃注斷絶宫宅安穩怪夢消除二儀交泰則七曜調明風雨以時暄涼應節黎庶咸安兵戈止息天下太平醜虜歸降某所苦某病即蒙差
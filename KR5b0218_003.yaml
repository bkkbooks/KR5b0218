body:
  text: 向西九天禮懴臣等至心歸命第十九行梵紫虛上元首帶快見天帝君臣某等上啓太上無無至真無上無為大道應感真精第十九行梵紫虛上元首帶快見天帝君諱劉旦扇提羅鬱頭阿呵謹有當今皇帝遇荷玄恩幸藉餘慶屬當萬機君臨億兆任重嵩恆道慕堯舜既纘承於大業每省惕於眇躬道俗凌夷淳化難振隂翊匪資於鴻覆生靈曷遂於燕安或旱潦之所災或民庶之多難覩此物癘用叩天恩冀社稷之尊隆庶民物之康阜今以至心回向大道歸依天帝委命至真𢹂請臣等建三皇中元祈請大齊臣等誠愚誠魯非贊大猷之人特念巳叨巳忝敢負登盟之誓謹共精嚴依洞神之法立墠設位象三十六天燒香然燈應三十六地消釋幽暗招引神明為某摽露真文揚幡請命披心散髮謝過自新伏願天帝君降大慈之恩流罔極之澤垂救度之福賜更造之仁使道達神氣和合靈官衛護某身原赦宿新無量罪咎矜奬即今改悔丹誠以是功德歸流某七廟之靈九玄七祖一切先亡同得離幽苦上升福堂轉輪成真利祐見在使陵廟墳基肅寧殃注斷絶宫宅安穩怪夢消除二儀交泰則七曜調明風雨以時暄涼應節黎庶咸安兵戈止息天下太平醜虜歸降某所苦某病即蒙差愈或官司盜賊即得免過隨事言之衆災度脫壽命延長皇家道德日盛四海災消禎祥雲集八節安和一切羣生咸䝉福慶俱服正教同歸自然得道之後與天帝合真臣某等上啓太上無無至真無上無為大道應感真精第二十虛梵上清化靈須陀結愛天帝君諱彭移那幽津真釋維光那謹有當今皇帝遇荷玄恩幸藉餘慶屬當萬機君臨億兆任重嵩恆道慕堯舜既纘承於大業每省惕於眇躬道俗凌夷淳化難振隂翊匪資於鴻覆生靈曷遂於燕安或旱潦之所災或民庶之多難覩此物癘用叩天恩冀社稷之尊隆庶民物之康阜今以至心回向大道歸依天帝委命至真𢹂請臣等建三皇中元祈請大齊臣等誠愚誠魯非贊大猷之人特念已叨已忝敢負登盟之誓謹共精嚴依洞神之法立墠設位象三十六天燒香然燈應三十六地消釋幽暗招引神明為某摽露真文揚幡請命披心散髮謝過自新伏願天帝君降大慈之恩流罔極之澤垂救度之福賜更造之仁使道達神氣和合靈官衛護某身原赦宿新無量罪咎矜奬即今改悔丹誠以是功德歸流某七廟之靈九玄七祖一切先亡同得離幽苦上升福堂轉輪成真利祐見在使陵廟墳基肅寧殃注斷絶宫宅安穩怪夢消除二儀交泰則七曜調明風雨以時暄涼應節黎庶咸安兵戈止息天下太平醜虜歸降某所苦某病即䝉差愈或官司盜賊即得免過隨事言之衆災度脫壽命延長皇家道德日盛四海災消禎祥雲集八節安和一切羣生咸䝉福慶俱服正教同歸自然得道之後與天帝合真臣某等上啓太上無無至真無上無為大道應感真精第二十一上極無景洞微化應聲天帝君諱暉品鬱爵定世和謹有當今皇帝遇荷玄恩幸藉餘慶屬當萬機君臨億兆任重嵩恆道慕堯舜既纘承於大業每省惕於眇躬道俗凌夷淳化難振隂翊匪資於鴻覆生靈曷遂於燕安或旱潦之所災或民庶之多難覩此物癘用叩天恩冀社稷之尊隆庶民物之康阜今以至心回向大道歸依天帝委命至真擕請臣等建三皇中元祈請大齊臣等誠愚誠魯非贊大猷之人特念巳叨巳忝敢負登盟之誓謹共精嚴依洞神之法立墠設位象三十六天燒香然燈應三十六地消釋幽暗招引神明為某摽露真文揚幡請命披心散髮謝過自新伏願天帝君降大慈之恩流罔極之澤垂救度之福賜更造之仁使道達神氣和合靈官衛護某身原赦宿新無量罪咎矜奬即今改悔丹誠以是功德歸流某七廟之靈九玄七祖一切先亡同得離幽苦上升福堂轉輪成真利祐見在使陵廟墳基肅寧殃注斷絶宫宅安穩怪夢消除二儀交泰則七曜調明風雨以時暄涼應節黎庶咸安兵戈止息天下太平醜虜歸降某所苦某病即蒙差愈或官司盜賊即得免過隨事言之衆災度脫壽命延長皇家道德日盛四海災消禎祥雲集八節安和一切羣生咸蒙福慶俱服正教同歸自然得道之後與天帝合真臣某等上啓太上無無至真無上無為大道應感真精第二十二大梵九玄中元氣阿那給道德天帝君諱撻尼始隂夜寶開緣沙謹有當今皇帝遇荷玄恩幸藉餘慶屬當萬機君臨億兆任重嵩恆道慕堯舜既纘承於大業每省惕於眇躬道俗凌夷淳化難振隂翎匪資於鴻覆生靈曷遂於燕安或旱潦之所災或民庶之多難覩此物癘用叩天恩冀社稷之尊隆庶民物之康阜今以至心回向大道歸依天帝委命至真𢹂請臣等建三皇中元祈請大齊臣等誠愚誠魯非贊大猷之人特念巳叨巳忝敢負登盟之誓謹共精嚴依洞神之法立墠設位象三十六天燒香然燈應三十六地消釋幽暗招引神明為某摽露真文揚幡請命披心散髮謝過自新伏願天帝君降大慈之恩流罔極之澤垂救度之福賜更造之仁使道達神氣和合靈官衛護某身原赦宿新無量罪咎矜奬即今攺悔丹誠以是功德歸流某七廟之靈九玄七祖一切先亡同得離幽苦上升福堂轉輪成真利祐見在使陵廟墳基肅寧殃注斷絶宫宅安穩怪夢消除二儀交泰則七曜調明風雨以時暄涼應節黎庶咸安兵戈止息天下太平醜虜歸降某所苦某病即蒙差愈或官司盜賊即得免過隨事言之衆災度脫壽命延長皇家道德日盛四海災消禎祥雲集八節安和一切羣生咸䝉福慶俱服正教同歸自然得道之後與天帝合真臣某等上啓太上無無至真無上無為大道應感真精第二十三行梵元清下靈氣須達天帝君諱周難首法光量量國羅謹有當今皇帝遇荷玄恩幸藉餘慶屬當萬機君臨億兆任重嵩恆道慕堯舜既纘承於大業每省惕於眇躬道俗凌夷淳化難振隂翊匪資於鴻覆生靈
body:
  text: 向南九天禮懴臣等至心歸命第十玄梵玉虛無精無羅迦淨明天帝君臣某等上啓太上無無至真無上無為大道應感真精第十玄梵玉虛無精無羅迦淨明天帝君諱周阿迦須回素劫起飛陀謹有當今皇帝遇荷玄恩幸藉餘慶屬當萬機君臨億兆任重嵩恆道慕堯舜既纘承於大業每省惕於眇躬道俗凌夷淳化難振隂翊匪資於鴻覆生靈曷遂於燕安或旱潦之所災或民庶之多難覩此物癘用叩天恩冀社稷之尊隆庶民物之康阜今以至心回向大道歸依天帝委命至真攜請臣等建三皇中元祈請大齋臣等誠愚誠魯非贊大猷之人特念巳叨巳忝敢負登盟之誓謹共精嚴依洞神之法立墠設位象三十六天燒香然燈應三十六地消釋幽暗招引神明為某摽露真文揚幡請命披心散髮謝過自新伏願天帝君降大慈之恩流罔極之澤垂救度之福賜更造之仁使道達神氣和合靈官衛護某身原赦宿新無量罪咎矜奬即今改悔丹誠以是功德歸流某七廟之靈九玄七祖一切先亡同得離幽苦上升福堂轉輪成真利祐見在使陵廟墳基肅寧殃注斷絶宫宅安穩怪夢消除二儀交泰則七曜調明風雨以時暄涼應節黎庶咸安兵戈止息天下太平醜虜歸降某所苦某病即蒙差愈或官司盜賊即得免過隨事言之衆災度脫壽命延長皇家道德日盛四海災消禎祥雲集八節安和一切羣生咸蒙福慶俱服正教同歸自然得道之後與天帝合真臣某等上啓太上無無至真無上無為大道應感真精第十一無玄元建上靈大赤天帝君諱淸淨玦根植逐百無和謹有當今皇帝遇荷玄恩幸藉餘慶屬當萬機君臨億兆任重嵩恆道慕堯舜既纘承於大業每省惕於眇躬道俗淩夷淳化難振隂翊匪資於鴻覆生靈曷遂於燕安或旱潦之所災或民庶之多難覩此物癘用叩天恩冀社稷之尊隆庶民物之康阜今以至心回向大道歸依天帝委命至真攜請臣等建三皇中元祈請大齋臣等誠愚誠魯非贊大猷之人特念巳叨巳忝敢負登盟之誓謹共精嚴依洞神之法立墠設位象三十六天燒香然燈應三十六地消釋幽暗招引神明為某摽露真文揚幡請命披心散髮謝過自新伏願天帝君降大慈之恩流罔極之澤垂救度之福賜更造之仁使道達神氣和合靈官衛護某身原赦宿新無量罪咎矜奬即今改悔丹誠以是功德歸流某七廟之靈九玄七祖一切先亡同得離幽苦上升福堂轉輪成真利祐見在使陵廟墳基肅寧殃注斷絶宫宅安穩怪夢消除二儀交泰則七曜調明風雨以時暄涼應節黎庶咸安兵戈止息天下太平醜虜歸降某所苦某病即蒙差愈或官司盜賊即得免過隨事言之衆災度脫壽命延長皇家道德日盛四海災消禎祥雲集八節安和一切羣生咸蒙福慶俱服正教同歸自然得道之後與天帝合真臣某等上啓太上無無至真無上無為大道應感真精第十二梵玄元氣離惒行如天帝君諱固分若盈沖都玄鏡車謹有當今皇帝遇荷玄恩幸藉餘慶屬當萬機君臨億兆任重嵩恆道慕堯舜既纘承於大業每省惕於眇躬道俗凌夷淳化難振隂翊匪資於鴻覆生靈曷遂於燕安或旱潦之所災或民庶之多難覩此物癘用叩天恩冀社稷之尊隆庶民物之康阜今以至心回向大道歸依天帝委命至真攜請臣等建三皇中元祈請大齋臣等誠愚誠魯非贊大猷之人特念巳叨巳忝敢負登盟之誓謹共精嚴依洞神之法立墠設位象三十六天燒香然燈應三十六地消釋幽暗招引神明為某摽露真文揚幡請命披心散髮謝過自新伏願天帝君降大慈之恩流罔極之澤垂救度之福賜更造之仁使道達神氣和合靈官衛護某身原赦宿新無量罪咎矜奬即今改悔丹誠以是功德歸流某七廟之靈九玄七祖一切先亡同得離幽苦上升福堂轉輪成真利祐見在使陵廟墳基肅寧殃注斷絶宫宅安穩怪夢消除二儀交泰則七曜調明風雨以時暄涼應節黎庶咸安兵戈止息天下太平醜虜歸降某所苦某病即蒙差愈或官司盜賊即得免過隨事言之衆災度脫壽命延長皇家道德日盛四海災消禎祥雲集八節安和一切羣生咸蒙福慶俱服正教同歸自然得道之後與天帝合真臣某等上啓太上無無至真無上無為大道應感真精第十三無極上虛玉竺玄同寂然天帝君諱泮陀娥阿森呵根謹有當今皇帝遇荷玄恩幸藉餘慶屬當萬機君臨億兆任重嵩恆道慕堯舜既纘承於大業每省惕於眇躬道俗凌夷淳化難振隂翊匪資於鴻覆生靈曷遂於燕安或旱潦之所災或民庶之多難覩此物癘用叩天恩冀社稷之尊隆庶民物之康阜今以至心回向大道歸依天帝委命至真攜請臣等建三皇中元祈請大齋臣等誠愚誠魯非贊大猷之人特念已叨已忝敢負登盟之誓謹共精嚴依洞神之法立墠設位象三十六天燒香然燈應三十六地消釋幽暗招引神明為某摽露真文揚幡請命披心散髮謝過自新伏願天帝君降大慈之恩流罔極之澤垂救度之福賜更造之仁使道達神氣和合靈官衛護某身原赦宿新無量罪咎矜奬即今改悔丹誠以是功德歸流某七廟之靈九玄七祖一切先亡同得離幽苦上升福堂轉輪成真利祐見在使陵廟墳基肅寧殃注斷絶宫宅安穩怪夢消除二儀交泰則七曜調明風雨以時暄涼應節黎庶咸安兵戈止息天下太平醜虜歸降某所苦某病即蒙差愈或官司盜賊即得免過隨事言之衆災度脫壽命延長皇家道德日盛四海災消禎祥雲集八節安和一切羣生咸蒙福慶俱服正教同歸自然得道之後與天帝合真臣某等上啓太上無無至真無上無為大道應感真精第十四寶梵無色上真潘羅玄妙天帝君諱隋黎沐音緣羅園迦摩騫謹有當今皇帝遇荷玄恩幸藉餘慶屬當萬機君臨億兆任重嵩恆道慕堯舜既纘承於大業每省惕於眇躬道俗凌夷淳化難振隂翊匪資於鴻覆生靈曷遂於燕安或